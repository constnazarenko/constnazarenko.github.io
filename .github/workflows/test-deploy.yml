name: Tests and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint_and_tests:
    name: Run linter and tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Use Node.js 18.16.0
      uses: actions/setup-node@v2
      with:
        node-version: '18.16.0'
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Linters
      run: npm run lint
    - name: Tests
      run: npm test
